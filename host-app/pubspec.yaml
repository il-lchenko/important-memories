name: important_memories_host
description: "Important Memories — цифровая одноразовая камера для ивентов"
publish_to: 'none'
version: 1.0.30+31

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.6.2

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP & API
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0

  # Share / file
  share_plus: ^10.0.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  gal: ^1.2.0

  # Utils
  intl: ^0.19.0
  path: ^1.9.0

  # Audio playback (voice comments)
  just_audio: ^0.9.40

  # QR scanner + camera permissions
  mobile_scanner: ^6.0.0
  permission_handler: ^11.3.1

  # Native camera + image processing
  camera: ^0.11.1
  image: ^4.3.0

  # Voice recording (native — works on Huawei/Yandex browser Android!)
  record: ^5.2.0

  # Deep links — Android App Links for impomento.pro/g/CODE
  app_links: ^6.3.0

  # Accelerometer-based device orientation (for camera UI rotation)
  sensors_plus: ^6.1.1
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.2
  retrofit_generator: ^9.1.5
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
