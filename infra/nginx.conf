worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    upstream backend {
        server backend:8000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name impomento.pro www.impomento.pro;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name impomento.pro www.impomento.pro;

        ssl_certificate     /etc/letsencrypt/live/impomento.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/impomento.pro/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # MinIO S3 proxy (presigned uploads/downloads from clients)
        # ^~ prevents regex locations (static assets) from overriding this prefix
        location ^~ /s3/ {
            proxy_pass         http://minio:9000/;
            proxy_set_header   Host minio:9000;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_buffering    off;
            client_max_body_size 50M;
        }

        # Flutter APK — уже присылает /api/v1/..., передаём как есть
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend/api/v1/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 20M;
        }

        # Гостевая PWA — присылает /api/guest/..., добавляем /v1/
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/api/(.*)$ /api/v1/$1 break;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 20M;
        }

        # Android App Links verification
        location ^~ /.well-known/ {
            root /var/www/pwa;
            default_type application/json;
            try_files $uri =404;
        }

        # PWA статика
        location / {
            root  /var/www/pwa;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Долгий кэш для хэшированных ассетов
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2)$ {
            root  /var/www/pwa;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
