worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    # Строгий лимит для аутентификации: 10 запросов/мин на IP
    # Защита от брутфорса email code и refresh token.
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    # Ещё строже — для guest join endpoints. Защита от подбора short_code.
    limit_req_zone $binary_remote_addr zone=guest_join:10m rate=5r/m;

    upstream backend {
        server backend:8000;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name impomento.pro www.impomento.pro;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name impomento.pro www.impomento.pro;

        ssl_certificate     /etc/letsencrypt/live/impomento.pro/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/impomento.pro/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers — apply to all responses
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
        # CSP: allow inline styles (Tailwind), inline scripts (Vite HMR/hydration), our S3, YooKassa checkout.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://yookassa.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; media-src 'self' blob: https:; connect-src 'self' https://api.yookassa.ru wss://impomento.pro; frame-src https://yookassa.ru; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests" always;

        # DEPRECATED — Timeweb S3 migration. Clients now hit https://s3.twcstorage.ru directly.
        # Kept as a stub returning 410 Gone so legacy pre-signed URLs fail visibly instead
        # of silently reaching the (now data-less) MinIO container.
        location ^~ /s3/ {
            return 410 "Legacy S3 endpoint. Client should use fresh presigned URL from API.";
            add_header Content-Type "text/plain" always;
        }

        # YooKassa webhook — IP-whitelist (YooKassa не подписывает payload HMAC)
        # Актуальные IP: https://yookassa.ru/developers/using-api/webhooks#ip
        # Проверять раз в квартал.
        location = /api/v1/webhooks/yookassa {
            allow 185.71.76.0/27;
            allow 185.71.77.0/27;
            allow 77.75.153.0/25;
            allow 77.75.154.128/25;
            allow 77.75.156.11;
            allow 77.75.156.35;
            allow 2a02:5180::/32;
            deny all;

            proxy_pass         http://backend/api/v1/webhooks/yookassa;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
            client_max_body_size 1M;
        }

        # Ещё строже — защита от подбора short_code гостями.
        # 5 попыток/мин, burst=2 (короткие всплески при быстром сканировании QR — норм).
        location ~ ^/api/v1/guest/(events/|sessions) {
            limit_req zone=guest_join burst=3 nodelay;
            # Общий rewrite делает /api/guest/... → /api/v1/guest/...
            rewrite ^/api/guest/(.*)$ /api/v1/guest/$1 break;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 1M;
        }

        # Строгий rate limit для /auth эндпоинтов (email code, verify, refresh)
        location ~ ^/api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 1M;
        }

        # Flutter APK — уже присылает /api/v1/..., передаём как есть
        location /api/v1/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend/api/v1/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 20M;
        }

        # Гостевая PWA — присылает /api/guest/..., добавляем /v1/
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/api/(.*)$ /api/v1/$1 break;
            proxy_pass         http://backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            client_max_body_size 20M;
        }

        # Android App Links verification
        location ^~ /.well-known/ {
            root /var/www/pwa;
            default_type application/json;
            try_files $uri =404;
        }

        # PWA статика. try_files с $uri.html — чтобы /privacy и /offer резолвились в privacy.html / offer.html.
        location / {
            root  /var/www/pwa;
            index index.html;
            try_files $uri $uri.html $uri/ /index.html;
        }

        # Долгий кэш для хэшированных ассетов
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff2)$ {
            root  /var/www/pwa;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
